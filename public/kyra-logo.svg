<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="Kyra">
  <g fill="#F2EEE4">
    <!-- Vertical stem -->
    <rect x="0" y="0" width="12" height="56" />

    <!-- Upper arm: small square, tilted up-right -->
    <rect
      x="19"
      y="7"
      width="15"
      height="15"
      transform="rotate(38 26.5 14.5)"
    />

    <!-- Lower arm: wider block, tilted down-right -->
    <rect
      x="18"
      y="33"
      width="24"
      height="13"
      transform="rotate(-32 30 39.5)"
    />
  </g>

  <text
    x="58"
    y="38"
    fill="#F2EEE4"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="30"
    font-weight="400"
    letter-spacing="-0.02em"
  >kyra</text>
</svg>
