name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN is not set in secrets"
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_CHAT_ID is not set in secrets"
          fi

      - name: Run ESLint
        run: npm run lint

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Analyze bundle size
        run: |
          npm install --save-dev @next/bundle-analyzer
          ANALYZE=true npm run build 2>&1 | tee bundle-analysis.log
        continue-on-error: true

      - name: Comment bundle size on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('bundle-analysis.log', 'utf8');
            const bundleInfo = log.match(/dist\/\(.*?\)/g);
            if (bundleInfo) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## 📦 Bundle Analysis\n```\n' + bundleInfo.join('\n') + '\n```'
              });
            }
